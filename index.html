    margin-bottom: 14px;
    font-family: var(--font-heading);
    font-size: 12.5px;
    color: var(--text-2);
    letter-spacing: 0.12em;
  }

  .faction-card-meta b {
    color: var(--gold-bright);
    font-weight: 400;
    font-family: var(--font-latin);
    font-size: 14px;
  }

  .death-bar {
    display: flex;
    height: 8px;
    margin-bottom: 8px;
    border-radius: 1px;
    overflow: hidden;
    background: var(--bg-3);
  }

  .death-bar span {
    height: 100%;
  }

  .faction-card-stats {
    font-family: var(--font-heading);
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 0.1em;
    line-height: 1.7;
    margin-top: 6px;
  }

  .faction-card-stats em {
    font-style: normal;
    color: var(--text);
  }

  /* === 關係圖 === */
  .graph-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .graph-controls .filter-label {
    margin-right: 0;
  }

  .graph-toggle {
    background: transparent;
    border: 1px solid var(--border-gold);
    color: var(--text-2);
    padding: 6px 14px;
    font-family: var(--font-heading);
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.12em;
    transition: all 0.2s;
  }

  .graph-toggle:hover { color: var(--gold); border-color: var(--gold); }
  .graph-toggle.active { background: var(--gold); color: var(--bg-0); border-color: var(--gold); }

  .graph-container {
    background: rgba(10, 8, 6, 0.5);
    border: 1px solid var(--border-gold);
    height: 700px;
    position: relative;
    overflow: hidden;
  }

  #graph-svg {
    width: 100%;
    height: 100%;
    display: block;
    cursor: grab;
  }
  #graph-svg:active { cursor: grabbing; }

  #graph-svg .node {
    cursor: pointer;
    stroke: rgba(0, 0, 0, 0.5);
    stroke-width: 1px;
    transition: opacity 0.2s, stroke 0.2s, stroke-width 0.2s;
  }
  #graph-svg .node.tian { stroke-width: 1.5px; }
  #graph-svg .node.dim { opacity: 0.15; }
  #graph-svg .node.highlight { stroke: var(--gold-bright); stroke-width: 2.5px; }

  #graph-svg .node-label {
    font-family: var(--font-heading);
    font-size: 12px;
    fill: var(--text);
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: central;
    opacity: 0;
    transition: opacity 0.15s;
  }
  #graph-svg .node-label.show { opacity: 1; }

  #graph-svg .link {
    fill: none;
    transition: opacity 0.2s, stroke-width 0.2s;
  }
  #graph-svg .link.sworn { stroke: rgba(201, 169, 97, 0.35); stroke-width: 1px; }
  #graph-svg .link.enemy { stroke: rgba(168, 50, 50, 0.5); stroke-width: 1px; stroke-dasharray: 3 3; }
  #graph-svg .link.dim { opacity: 0.1; }
  #graph-svg .link.highlight { stroke-width: 2px; opacity: 1; }

  .graph-tooltip {
    position: absolute;
    background: var(--bg-2);
    border: 1px solid var(--gold);
    padding: 8px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    max-width: 240px;
  }

  .graph-tooltip.show { opacity: 1; }

  .graph-tooltip .tt-name {
    font-family: var(--font-heading);
    color: var(--gold);
    font-size: 16px;
    margin-bottom: 2px;
  }

  .graph-tooltip .tt-info {
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.05em;
  }

  .graph-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 14px;
    padding: 12px 16px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    font-family: var(--font-heading);
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.08em;
  }

  .graph-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .graph-legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .graph-legend-line {
    width: 18px;
    height: 0;
    border-top: 1.5px solid;
    display: inline-block;
  }

  .graph-help {
    color: var(--text-3);
    font-size: 12px;
    font-family: var(--font-heading);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.1em;
  }

  /* === 動畫覆蓋層（聚義時序播放）=== */
  .play-overlay {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 8, 6, 0.85);
    border: 1px solid var(--gold);
    padding: 12px 24px;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    min-width: 220px;
  }
  .play-overlay.show { opacity: 1; }

  .play-chapter {
    font-family: var(--font-display);
    color: var(--gold);
    font-size: 26px;
    line-height: 1;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .play-counter {
    font-family: var(--font-heading);
    color: var(--text-2);
    font-size: 13px;
    letter-spacing: 0.18em;
  }

  .play-event {
    font-family: var(--font-heading);
    color: var(--gold-bright);
    font-size: 12px;
    margin-top: 4px;
    letter-spacing: 0.1em;
  }

  /* === 招安路線視圖 === */
  .stance-view { display: none; }
  .stance-view.show { display: block; animation: fadeIn 0.4s ease-out; }

  .stance-intro {
    background: rgba(20, 17, 13, 0.6);
    border: 1px solid var(--border-gold);
    padding: 24px 28px;
    margin-bottom: 28px;
  }

  .stance-intro-title {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--gold);
    margin-bottom: 12px;
    letter-spacing: 0.1em;
  }

  .stance-intro-text {
    color: var(--text-2);
    font-size: 14.5px;
    line-height: 1.85;
  }

  .stance-intro-text em {
    font-style: normal;
    color: var(--gold-bright);
  }

  .stance-bar {
    display: flex;
    height: 16px;
    margin-top: 16px;
    border: 1px solid var(--border-gold);
    overflow: hidden;
  }
  .stance-bar span {
    height: 100%;
    transition: opacity 0.2s;
  }
  .stance-bar .anti { background: #a83232; }
  .stance-bar .neutral { background: #7a6b5a; }
  .stance-bar .pro { background: #d4a857; }

  .stance-cols {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 900px) {
    .stance-cols { grid-template-columns: 1fr; }
  }

  .stance-col {
    background: rgba(20, 17, 13, 0.7);
    border: 1px solid var(--border);
    border-top-width: 3px;
    padding: 22px;
    position: relative;
  }
  .stance-col.anti { border-top-color: #a83232; }
  .stance-col.neutral { border-top-color: #7a6b5a; }
  .stance-col.pro { border-top-color: #d4a857; }

  .stance-col-head {
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--border);
  }

  .stance-col-title {
    font-family: var(--font-heading);
    font-size: 20px;
    letter-spacing: 0.18em;
    margin-bottom: 4px;
  }
  .stance-col.anti .stance-col-title { color: #d4847a; }
  .stance-col.neutral .stance-col-title { color: #b0a585; }
  .stance-col.pro .stance-col-title { color: var(--gold); }

  .stance-col-meta {
    font-family: var(--font-latin);
    font-size: 13px;
    color: var(--text-2);
    letter-spacing: 0.1em;
  }

  .stance-col-meta b {
    font-weight: 500;
    color: var(--gold-bright);
    margin-right: 4px;
  }

  .stance-quote {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--text-2);
    font-style: italic;
    margin: 10px 0 4px;
    line-height: 1.6;
    padding-left: 10px;
    border-left: 2px solid var(--gold-dim);
  }

  .stance-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .stance-chip {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-left: 2px solid;
    padding: 6px 10px 6px 9px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }

  .stance-chip:hover {
    border-color: var(--gold);
    border-left-color: var(--gold);
    background: var(--bg-2);
    transform: translateX(2px);
  }

  .stance-chip-name {
    font-family: var(--font-heading);
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .stance-chip-nick {
    font-size: 11px;
    color: var(--text-3);
    margin-left: 4px;
  }

  .stance-chip.tian .stance-chip-name {
    color: var(--gold);
  }

  /* === 音效按鈕 === */
  .sound-toggle {
    background: rgba(20, 17, 13, 0.6);
    border: 1px solid var(--border-gold);
    color: var(--text-2);
    width: 44px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    margin-left: 4px;
  }

  .sound-toggle:hover {
    color: var(--gold);
    border-color: var(--gold);
  }

  .sound-toggle.on {
    background: var(--gold);
    color: var(--bg-0);
    border-color: var(--gold);
  }

  .sound-hint {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(10, 8, 6, 0.92);
    border: 1px solid var(--gold);
    padding: 12px 18px;
    color: var(--text);
    font-family: var(--font-heading);
    font-size: 13px;
    letter-spacing: 0.1em;
    z-index: 100;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    pointer-events: none;
    max-width: 280px;
  }

  .sound-hint.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* === 名言區塊 === */
  .quote-block {
    margin-top: 18px;
    padding: 14px 16px;
    background: rgba(201, 169, 97, 0.06);
    border-left: 2px solid var(--gold);
    position: relative;
  }

  .quote-text {
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--gold-bright);
    line-height: 1.7;
    font-weight: 300;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .quote-ctx {
    font-family: var(--font-heading);
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }

  .quote-button {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 5px 14px 5px 12px;
    font-family: var(--font-heading);
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .quote-button:hover {
    background: var(--gold-soft);
    border-color: var(--gold);
  }

  .quote-button.playing {
    background: var(--gold);
    color: var(--bg-0);
    border-color: var(--gold);
  }

  .quote-button .icon {
    font-size: 13px;
  }

  .stars-section { margin-bottom: 56px; }

  .stars-section-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-gold);
  }

  .stars-section-title {
    font-family: var(--font-display);
    font-size: 38px;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  .stars-count {
    font-family: var(--font-latin);
    font-size: 13px;
    color: var(--text-2);
    letter-spacing: 0.2em;
  }

  .stars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .star-tile {
    background: rgba(20, 17, 13, 0.7);
    border: 1px solid var(--border);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.22s;
    position: relative;
    overflow: hidden;
  }

  .star-tile:hover {
    border-color: var(--gold);
    background: var(--bg-2);
    transform: translateY(-2px);
  }

  .star-tile:hover::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .star-rank {
    font-family: var(--font-latin);
    font-size: 11px;
    color: var(--gold-dim);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
    font-style: italic;
  }

  .star-tile-star {
    font-family: var(--font-heading);
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 4px;
    letter-spacing: 0.15em;
  }

  .star-tile-name {
    font-family: var(--font-heading);
    font-size: 19px;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: 0.04em;
  }

  .star-tile-nick {
    font-size: 13px;
    color: var(--text-2);
  }

  .footer {
    text-align: center;
    padding: 60px 24px 50px;
    color: var(--text-3);
    font-size: 13px;
    letter-spacing: 0.25em;
    border-top: 1px solid var(--border);
    margin-top: 60px;
    font-family: var(--font-heading);
  }

  .footer-mark {
    font-family: var(--font-display);
    color: var(--gold-dim);
    font-size: 32px;
    margin-bottom: 14px;
    letter-spacing: 0.1em;
  }

  .footer-line {
    margin-bottom: 8px;
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-3);
  }

  .empty-mark {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--gold-dim);
    margin-bottom: 12px;
    letter-spacing: 0.1em;
  }

  .empty-text {
    font-family: var(--font-heading);
    letter-spacing: 0.2em;
  }

  .highlight-flash {
    animation: highlightFlash 1.6s ease-out;
  }

  @keyframes highlightFlash {
    0%, 30% { box-shadow: 0 0 0 2px var(--gold), 0 0 30px rgba(201, 169, 97, 0.3); }
    100% { box-shadow: 0 0 0 0 transparent, 0 0 0 transparent; }
  }

  @media (max-width: 640px) {
    .hero { padding: 56px 20px 36px; }
    .stats { grid-template-columns: 1fr; gap: 10px; max-width: 280px; }
    .stat-num { font-size: 36px; }
    .controls-row { flex-direction: column; align-items: stretch; }
    .view-toggle { width: 100%; }
    .view-btn { flex: 1; }
    .timeline::before { left: 20px; }
    .hero-card { padding-left: 56px; }
    .hero-num { left: 4px; width: 30px; height: 30px; font-size: 12px; }
    .name { font-size: 20px; }
    .nick { font-size: 14px; }
    .stars-grid { grid-template-columns: 1fr; }
    .stars-section-title { font-size: 30px; }
    .card-body { padding: 16px 16px; }
    .detail-row { flex-direction: column; gap: 4px; }
    .detail-key { min-width: auto; }
    .rel-label { min-width: auto; }
  }
  /* === 繪圖提示詞展開區 === */
  .prompt-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px dashed var(--border-gold);
  }
  .prompt-toggle {
    background: transparent;
    border: 1px solid var(--border-gold);
    color: var(--gold);
    padding: 9px 14px;
    cursor: pointer;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 2px;
    transition: all 0.2s;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .prompt-toggle:hover {
    background: var(--gold-soft);
    color: var(--gold-bright);
  }
  .prompt-toggle::after {
    content: '▾';
    transition: transform 0.2s;
    font-size: 14px;
  }
  .prompt-toggle.open::after { transform: rotate(180deg); }
  .prompt-content {
    margin-top: 12px;
    padding: 14px 14px 14px 16px;
    background: var(--bg-2);
    border-left: 3px solid var(--gold-dim);
    border-radius: 2px;
    position: relative;
    display: none;
  }
  .prompt-content.show {
    display: block;
    animation: promptFadeIn 0.22s ease-out;
  }
  @keyframes promptFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .prompt-text {
    color: var(--text-2);
    font-family: var(--font-body);
    font-size: 13px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
    padding-right: 78px;
  }
  .prompt-copy {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--gold);
    color: var(--bg-0);
    border: none;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .prompt-copy:hover { background: var(--gold-bright); }
  .prompt-copy.copied { background: var(--text-3); color: var(--text); cursor: default; }

  /* === Hero Modal（從 stars / stance / graph / 關係圖 點任何人都可彈出） === */
  .hero-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-y: auto;
  }
  .hero-modal.show {
    display: flex;
    animation: heroModalFadeIn 0.25s ease-out;
  }
  .hero-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(8, 6, 4, 0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    cursor: pointer;
  }
  .hero-modal-content {
    position: relative;
    width: 100%;
    max-width: 720px;
    margin: auto;
    background: var(--bg-1);
    border: 1px solid var(--border-gold);
    border-radius: 4px;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(201, 169, 97, 0.08);
    animation: heroModalSlideUp 0.3s cubic-bezier(0.2, 0.7, 0.3, 1);
  }
  .hero-modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border: 1px solid var(--border-gold);
    background: var(--bg-2);
    color: var(--gold);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    border-radius: 50%;
    z-index: 10;
    transition: all 0.2s;
    font-family: inherit;
  }
  .hero-modal-close:hover {
    background: var(--gold);
    color: var(--bg-0);
    transform: rotate(90deg);
  }
  .hero-modal-body {
    padding: 8px;
  }
  /* modal 內的卡片：永遠展開、不可被點擊收起、移除 hover 效果 */
  .hero-modal-body .hero-card {
    margin: 0;
    padding-left: 56px;
  }
  .hero-modal-body .card-body {
    cursor: default;
  }
  .hero-modal-body .card-body:hover {
    background: inherit;
    transform: none;
  }
  @keyframes heroModalFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes heroModalSlideUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @media (max-width: 640px) {
    .hero-modal { padding: 16px 8px; }
    .hero-modal-body .hero-card { padding-left: 48px; }
  }
</style>
</head>
<body>

<audio id="bgmAudio" loop preload="auto">
  <source src="examples/tunetank-asian-epic-adventure-music-414102.mp3" type="audio/mpeg">
</audio>

<div id="hero-modal" class="hero-modal" aria-hidden="true" role="dialog" aria-label="人物詳細資料">
  <div class="hero-modal-backdrop" id="hero-modal-backdrop"></div>
  <div class="hero-modal-content">
    <button class="hero-modal-close" id="hero-modal-close" aria-label="關閉">×</button>
    <div class="hero-modal-body" id="hero-modal-body"></div>
  </div>
</div>

<header class="hero">
  <svg class="hero-ornament" viewBox="0 0 60 60" fill="none" aria-hidden="true">
    <circle cx="30" cy="30" r="26" stroke="#c9a961" stroke-width="0.5" opacity="0.4"/>
    <circle cx="30" cy="30" r="20" stroke="#c9a961" stroke-width="0.5" opacity="0.55"/>
    <circle cx="30" cy="30" r="14" stroke="#c9a961" stroke-width="0.5" opacity="0.7"/>
    <path d="M30 4 L30 56 M4 30 L56 30" stroke="#c9a961" stroke-width="0.4" opacity="0.35"/>
    <path d="M12 12 L48 48 M12 48 L48 12" stroke="#c9a961" stroke-width="0.4" opacity="0.3"/>
    <circle cx="30" cy="30" r="3" fill="#c9a961"/>
  </svg>
  <h1 class="title-cn">水滸傳 一百零八將</h1>
  <p class="title-en">The Hundred and Eight Stars of Destiny</p>

<script>
// === 音效系統 ===
let audioCtx = null;
let audioEnabled = false;

function ensureAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn('Web Audio not supported');
    }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playChime(freq, duration, volume) {
  if (!audioEnabled || !ensureAudio()) return;
  freq = freq || 880;
  duration = duration || 0.5;
  volume = volume || 0.18;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
  // 加一個高音泛音
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;
  gain2.gain.setValueAtTime(0, audioCtx.currentTime);
  gain2.gain.linearRampToValueAtTime(volume * 0.4, audioCtx.currentTime + 0.01);
  gain2.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration * 0.6);
  osc2.connect(gain2).connect(audioCtx.destination);
  osc2.start();
  osc2.stop(audioCtx.currentTime + duration * 0.6);
}

function playDrum(volume) {
  if (!audioEnabled || !ensureAudio()) return;
  volume = volume || 0.4;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(110, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(35, audioCtx.currentTime + 0.18);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

function playGong(volume) {
  if (!audioEnabled || !ensureAudio()) return;
  volume = volume || 0.32;
  const duration = 3.0;
  // 多重諧波模擬鑼的金屬感
  const freqs = [98, 147, 220, 330, 440, 588];
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = i < 2 ? 'sine' : 'triangle';
    osc.frequency.value = f;
    osc.frequency.exponentialRampToValueAtTime(f * 0.97, audioCtx.currentTime + duration);
    const v = volume / Math.pow(i + 1, 0.7);
    gain.gain.setValueAtTime(v, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  });
  // 加一點寬頻噪聲模擬金屬撞擊瞬間
  const bufSize = audioCtx.sampleRate * 0.4;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 900;
  filter.Q.value = 2;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(volume * 0.4, audioCtx.currentTime);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  noise.connect(filter).connect(noiseGain).connect(audioCtx.destination);
  noise.start();
  noise.stop(audioCtx.currentTime + 0.4);
}

// 語音相關移除（不夠精緻），改加古琴 BGM / 翻書聲 / 開場編鐘

// === 古琴五聲音階 BGM ===
const guqinFreqs = [];
[0.5, 1, 2].forEach(mult => {
  // 宮商角徵羽 (C, D, E, G, A) 三個八度
  [261.63, 293.66, 329.63, 392.00, 440.00].forEach(f => guqinFreqs.push(f * mult));
});

let bgmEnabled = false;
let bgmTimer = null;

function playGuqinNote(freq, vol) {
  if (!audioCtx) return;
  vol = vol || 0.06;
  const dur = 2.8;
  const t = audioCtx.currentTime;

  // 主音 (三角波，較柔和)
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'triangle';
  osc1.frequency.value = freq;
  // 高八度泛音
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;
  // 12 度泛音（古琴的金屬感）
  const osc3 = audioCtx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.value = freq * 3;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = freq * 6;
  filter.Q.value = 1.2;

  const gain1 = audioCtx.createGain();
  gain1.gain.setValueAtTime(0, t);
  gain1.gain.linearRampToValueAtTime(vol, t + 0.005);
  gain1.gain.exponentialRampToValueAtTime(0.0001, t + dur);

  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(vol * 0.45, t + 0.005);
  gain2.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.7);

  const gain3 = audioCtx.createGain();
  gain3.gain.setValueAtTime(0, t);
  gain3.gain.linearRampToValueAtTime(vol * 0.18, t + 0.005);
  gain3.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.5);

  osc1.connect(gain1).connect(filter).connect(audioCtx.destination);
  osc2.connect(gain2).connect(filter);
  osc3.connect(gain3).connect(filter);

  osc1.start(t); osc1.stop(t + dur);
  osc2.start(t); osc2.stop(t + dur);
  osc3.start(t); osc3.stop(t + dur);
}

// BGM 改為 mp3 自託管（真實樂器錄音，比合成更貼合武俠氛圍）
// 原本的隨機古琴合成 BGM 已棄用；playGuqinNote 函式仍保留供其他地方呼叫
const bgmAudio = document.getElementById('bgmAudio');
bgmAudio.volume = 0.45;

function startBGM() {
  bgmAudio.play().catch(err => console.warn('BGM 播放失敗：', err));
}

function stopBGM() {
  bgmAudio.pause();
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
}

function toggleBGM() {
  if (!audioEnabled) {
    showSoundHint('請先開啟音效（左邊的喇叭按鈕）');
    return;
  }
  bgmEnabled = !bgmEnabled;
  const btn = document.getElementById('bgm-toggle');
  btn.classList.toggle('on', bgmEnabled);
  if (bgmEnabled) {
    startBGM();
    showSoundHint('背景音樂已開啟');
  } else {
    stopBGM();
    showSoundHint('背景音樂已關閉');
  }
}

// === 翻書聲（紙張摩擦）===
function playPageFlip() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * 0.18;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    // 帶有 attack-decay 包絡的雜訊
    const r = i / bufSize;
    const env = r < 0.08 ? r / 0.08 : Math.pow(1 - (r - 0.08) / 0.92, 2);
    data[i] = (Math.random() * 2 - 1) * env;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2600;
  filter.Q.value = 0.7;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.13;

  src.connect(filter).connect(gain).connect(audioCtx.destination);
  src.start(t);
}

// === 開場編鐘（V2 滄海一聲笑型）===
// 純鐘聲下行 A5→G5→E5→D5→C5，末段空五度（A3+A4）落地
// 五聲音階下行為主軸（豁達中帶蒼涼）+ 留白與尾韻
// 總時長約 3.8 秒
function playOpeningBells() {
  if (!audioCtx) return;
  const seq = [
    { freq: 880,    delay: 0,    dur: 1.4, vol: 0.38 }, // A5 高八度起
    { freq: 783.99, delay: 420,  dur: 1.0, vol: 0.32 }, // G5
    { freq: 659.25, delay: 880,  dur: 1.1, vol: 0.34 }, // E5 屬音
    { freq: 587.33, delay: 1380, dur: 1.0, vol: 0.30 }, // D5 經過
    { freq: 523.25, delay: 1900, dur: 1.3, vol: 0.34 }, // C5 小三度
    { freq: 220,    delay: 2550, dur: 2.4, vol: 0.28 }, // A3 低八度鋪底
    { freq: 440,    delay: 2700, dur: 2.2, vol: 0.40 }, // A4 主音落地
  ];
  seq.forEach(b => {
    setTimeout(() => playChime(b.freq, b.dur, b.vol), b.delay);
  });
}

function showSoundHint(msg, duration) {
  const el = document.getElementById('sound-hint');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration || 2800);
}

function toggleAudio() {
  audioEnabled = !audioEnabled;
  const btn = document.getElementById('sound-toggle');
  btn.classList.toggle('on', audioEnabled);
  btn.textContent = audioEnabled ? '🔊' : '🔇';
  if (audioEnabled) {
    ensureAudio();
    // 開場編鐘
    playOpeningBells();
    showSoundHint('音效已開啟 · 點 🎵 可加上背景音樂');
  } else {
    // 關閉時也停 BGM
    if (bgmEnabled) {
      bgmEnabled = false;
      document.getElementById('bgm-toggle').classList.remove('on');
      stopBGM();
    }
    showSoundHint('音效已關閉');
  }
}

  11: "北宋末年漁夫，年約三十，**精瘦、面色微黑、胸前一隻深青色老虎刺青（佔滿胸膛）、面頰有刀疤**，散亂頭髮包巾、赤膊袒露刺青、下穿短麻褲，**手執鋼叉**。神情狂野不羈。背景：石碣湖、漁船。畫風：中國古風工筆。圖片**左上方直書「短命二郎阮小五」繁體書法**，**正下方朱紅方印刻「天罪」**。除此題款外不可有其他文字。",
  12: "北宋末年漁夫，年約二十六，**精瘦結實、面色黧黑、面相凶悍如閻羅**，散亂頭髮包巾、赤膊或穿短麻打、束腰，**手執鋼叉**。神情野性凶猛。背景：石碣湖、月下湖面。畫風：中國古風工筆。圖片**左上方直書「活閻羅阮小七」繁體書法**，**正下方朱紅方印刻「天敗」**。除此題款外不可有其他文字。",
  13: "北宋末年男性，年約二十八，**身材瘦小單薄、面色蒼白、面相猥瑣機靈**，戴黑巾、穿青色短打粗布衣、繫腰、肩挑酒桶或挑擔，**手執扁擔**。神情狡黠機靈。背景：黃泥岡或東溪村。畫風：中國古風工筆。圖片**左上方直書「白日鼠白勝」繁體書法**，**正下方朱紅方印刻「地賊」**。除此題款外不可有其他文字。",
  14: "北宋末年男性，年約三十五，身材偏矮但結實壯碩，**面色黧黑（綽號「黑宋江」）**，眉清目秀，眼神深沉內斂、似笑非笑，三縷短鬚，文官書吏打扮：青色長衫便服、黑色軟巾，腰束絲帶，手執書卷或羽扇。氣度仁厚而具城府、是亂世領袖而非武將。背景：水泊梁山聚義廳。畫風：中國古風工筆人物畫、半身像、水墨設色、淡雅。圖片**左上方直書「呼保義宋江」繁體中文書法**（楷書或行書），字色與背景形成對比；姓名正下方緊接**一枚朱紅方形篆刻印章，刻「天魁」二字**。除此題款外，圖片不可有其他文字。",
  15: "北宋末年男性，年約三十，**身高八尺、相貌堂堂、骨健筋強、虎背狼腰**，**頭陀打扮：披散長髮、頭戴鐵箍、頸掛骷髏念珠**，穿黑色短直裰、腰束皂絲絛、繫鐵戒尺，**雙手各持一把雪花鑌鐵戒刀**。神情冷峻凌厲、目光如電。背景：景陽崗山林或十字坡黑店、月夜。畫風：中國古風工筆。圖片**左上方直書「行者武松」繁體書法**，**正下方朱紅方印刻「天傷」**。除此題款外不可有其他文字。",
  16: "北宋末年青年武將，年約二十五，**身材修長挺拔、容貌俊美如唐代李廣再世**，面如冠玉、眉清目秀，**戴銀盔、披銀甲、穿白色戰袍**，腰懸雕弓箭袋，**手執銀鎗或拉滿弓**，騎白馬。氣質：英俊神箭、儒雅武將。背景：戰場、空中飛雁。畫風：中國古風工筆。圖片**左上方直書「小李廣花榮」繁體書法**，**正下方朱紅方印刻「天英」**。除此題款外不可有其他文字。",
  17: "北宋末年武將，年約三十五，**滿臉黑色絡腮鬍鬚、面如鍋底、雙目圓睜、性情急躁**，穿赤紅戰袍配紋甲、戴鳳翅盔，**手執狼牙棒**，騎黃驃馬。神情怒目而視、霹靂如雷。背景：戰場、火光衝天。畫風：中國古風工筆。圖片**左上方直書「霹靂火秦明」繁體書法**，**正下方朱紅方印刻「天猛」**。除此題款外不可有其他文字。",
  18: "北宋末年男性，年約三十五，**身材高瘦修長、雙腿特別精健**，面色微黃，戴皂色軟巾、穿黑色短直裰束腰、**腳上甲馬（綁四個甲馬符的草鞋）**，手執哨棒。神情精幹敏捷。背景：道路、奔行間風起雲湧。畫風：中國古風工筆。圖片**左上方直書「神行太保戴宗」繁體書法**，**正下方朱紅方印刻「天速」**。除此題款外不可有其他文字。",
  19: "北宋末年水手，年約三十，**身材修長精瘦、面色黝黑（常年日曬風吹）**，蓄短鬚，戴箬笠或包頭巾、穿短打麻布衫、繫腰，**手執船槳或鋼叉**。神情精幹靈活。背景：揚子江或梁山水泊、船上。畫風：中國古風工筆。圖片**左上方直書「混江龍李俊」繁體書法**，**正下方朱紅方印刻「天壽」**。除此題款外不可有其他文字。",
  20: "北宋末年男性，年約三十，**黑熊般魁梧粗壯體格、滿身黑色濃毛、面色焦黑如鍋底、麻臉粗糙、大眼圓睜、闊嘴露齒**，蓬亂黑髮，**赤膊或穿粗布短褂**、腰束粗皮帶，**雙手各持一把板斧**。神情凶悍粗野、目光卻直率天真。背景：戰場血戰、或沂水縣山林。畫風：中國古風工筆。圖片**左上方直書「黑旋風李逵」繁體書法**，**正下方朱紅方印刻「天殺」**。除此題款外不可有其他文字。",
  21: "北宋末年水手，年約二十八，**身材精壯、皮膚白皙如雪（綽號「白條」由來）、面目清秀**，包頭巾、赤膊上身露出白皙肌膚、下穿短水褲，**手執漁網或鋼叉**。神情靈動機敏。背景：揚子江中、入水翻浪。畫風：中國古風工筆。圖片**左上方直書「浪裡白條張順」繁體書法**，**正下方朱紅方印刻「天損」**。除此題款外不可有其他文字。",
  22: "北宋末年押獄劊子手，年約三十，**身材高瘦、面色蠟黃（蠟黃如病容，故稱「病關索」）**，蓄短鬚、戴黑巾、穿紅色行刑袍或押獄差服、繫紅帶，**手執行刑朴刀或鬼頭刀**。神情陰鷙冷峻。背景：薊州刑場或牢城。畫風：中國古風工筆。圖片**左上方直書「病關索楊雄」繁體書法**，**正下方朱紅方印刻「天牢」**。除此題款外不可有其他文字。",
  23: "北宋末年男性，年約二十八，**身材精悍瘦削、面色青黃、目光銳利凌厲**，戴皂巾、穿青色短打粗布衣、束腰、繫腿，**手執朴刀或柴斧**。神情倔烈直爽、目光如刀。背景：薊州街市或翠屏山。畫風：中國古風工筆。圖片**左上方直書「拚命三郎石秀」繁體書法**，**正下方朱紅方印刻「天慧」**。除此題款外不可有其他文字。",
  24: "北宋末年神偷，年約二十八，**身材極為瘦小靈活、面色蠟黃、雙目炯炯有神、手腳長靈活**，戴黑色軟巾或夜行頭套、穿緊身夜行衣（黑色或深藍色）、束腰、繫腿，**手執短刀或飛爪繩**。神情靈巧狡黠、飛簷走壁姿態。背景：夜色屋頂、飛簷上。畫風：中國古風工筆。圖片**左上方直書「鼓上蚤時遷」繁體書法**，**正下方朱紅方印刻「地狗」**。除此題款外不可有其他文字。",
  25: "北宋末年女將，年約二十二，**身材高挑修長、容貌絕美、面如桃花、目光英氣銳利**，**頭戴鳳翅金冠或女武人束髮、穿紅色或粉色錦繡戰袍配軟甲、腰束絲絛、裙擺飛揚**，**雙手各持一把寒月雙刀**，騎青鬃馬。氣質：絕色女將、巾幗不讓鬚眉。背景：祝家莊或梁山校場。畫風：中國古風工筆。圖片**左上方直書「一丈青扈三娘」繁體書法**，**正下方朱紅方印刻「地慧」**。除此題款外不可有其他文字。",
  26: "北宋末年獵戶，年約二十八，**身材結實精瘦、面色黝黑、雙目銳利**，戴獸皮帽、穿土褐色獵戶短打配虎皮坎肩、繫腿，**背負獵叉、手執鋼叉**，腰繫腰刀。神情精幹勇猛。背景：登州山林、雪地或夜獵。畫風：中國古風工筆。圖片**左上方直書「兩頭蛇解珍」繁體書法**，**正下方朱紅方印刻「天暴」**。除此題款外不可有其他文字。",
  27: "北宋末年獵戶，年約二十六，**身材精瘦結實、面色黝黑、面貌與兄解珍相似**，戴獸皮帽、穿褐色獵戶短打、繫腿，**背負弓箭、手執獵叉**，腰繫腰刀。神情比兄稍機敏。背景：登州山林。畫風：中國古風工筆。圖片**左上方直書「雙尾蠍解寶」繁體書法**，**正下方朱紅方印刻「天哭」**。除此題款外不可有其他文字。",
  28: "北宋末年武將，年約三十五，身材魁梧，**面色黝黑、留三縷黑長鬚**，戴鐵盔、披連環鎖子甲、穿烏雲戰袍，**雙手各持一根鋼鞭**，騎踢雪烏騅馬。氣度沉穩威武。背景：戰場、千軍萬馬連環馬陣。畫風：中國古風工筆。圖片**左上方直書「雙鞭呼延灼」繁體書法**，**正下方朱紅方印刻「天威」**。除此題款外不可有其他文字。",
  29: "北宋末年男性，年約三十五，**身高九尺、身材挺拔魁偉**，面如冠玉、皮膚白皙、英俊堂堂，眉目疏朗、神情高貴，留三縷美髯。穿錦緞貴族武人服飾、束玉帶，手執朴刀或長槍。氣質：富家貴公子兼武林高手，貴氣與英武並存。背景：北宋大名府富宅或梁山。畫風：中國古風工筆人物畫、半身像、水墨設色。圖片**左上方直書「玉麒麟盧俊義」繁體書法**，**正下方朱紅方印刻「天罡」二字**。除此題款外不可有其他文字。",
  30: "北宋末年男性，年約二十二，**身材修長挺拔、皮膚白皙如玉、容貌俊美無雙、眉清目秀如美少年**，**全身有極精緻華美的花卉刺青（花鳥圖案，連臂膀都是）**，束髮戴英雄結、穿藕色或淺青色錦緞勁裝、腰束絲絛，**手執弩弓或胡琴**。神情靈動機敏、貴氣與市井靈活並存。背景：東京勾欄瓦舍或泰山相撲台。畫風：中國古風工筆。圖片**左上方直書「浪子燕青」繁體書法**，**正下方朱紅方印刻「天巧」**。除此題款外不可有其他文字。",
  31: "北宋末年文士兼將領，年約三十五，**身材中等、面白瘦削、目光精明**，戴儒巾、穿青色道袍式長衫，**手執兵書或羽扇**。神情沉著有謀。背景：山寨議事廳或少華山。畫風：中國古風工筆。圖片**左上方直書「神機軍師朱武」繁體書法**，**正下方朱紅方印刻「地魁」**。除此題款外不可有其他文字。",
  32: "北宋末年山寨頭領，年約二十八，**身材結實、面色微黑、面相威武**，蓄短髭，戴武人巾、穿綠色或棕色武人勁裝、束腰，**手執點鋼槍**。神情勇猛。背景：少華山。畫風：中國古風工筆。圖片**左上方直書「跳澗虎陳達」繁體書法**，**正下方朱紅方印刻「地周」**。除此題款外不可有其他文字。",
  33: "北宋末年山寨頭領，年約二十六，**身材修長、面色微白、目光靈動**，戴黑巾、穿青色武人勁裝、束腰，**手執大桿刀**。神情機敏。背景：少華山。畫風：中國古風工筆。圖片**左上方直書「白花蛇楊春」繁體書法**，**正下方朱紅方印刻「地隱」**。除此題款外不可有其他文字。",
  34: "北宋末年貴公子，年約三十，**身材修長、皮膚白皙、相貌儒雅斯文**，蓄短鬚，戴儒巾、穿錦緞青色長衫、腰束玉帶，手執書卷或摺扇。氣度雍容有貴族氣派、目光溫和。背景：滄州柴府莊園、高雅廳堂。畫風：中國古風工筆。圖片**左上方直書「小旋風柴進」繁體書法**，**正下方朱紅方印刻「天貴」**。除此題款外不可有其他文字。",
  35: "北宋末年山寨頭領，年約三十，**身材異常高瘦修長（比常人高出一頭以上）、面色微黑、瘦削**，戴黑巾、穿青色短打、束腰，**手執朴刀**。神情粗獷。背景：梁山舊寨。畫風：中國古風工筆。圖片**左上方直書「摸著天杜遷」繁體書法**，**正下方朱紅方印刻「地妖」**。除此題款外不可有其他文字。",
  36: "北宋末年山寨頭領，年約三十二，**身材高大壯碩如金剛佛像、面色微黑**，戴黑巾、穿青色武人勁裝，**手執朴刀**。神情粗豪。背景：梁山泊舊聚義廳。畫風：中國古風工筆。圖片**左上方直書「雲裡金剛宋萬」繁體書法**，**正下方朱紅方印刻「地魔」**。除此題款外不可有其他文字。",
  37: "北宋末年酒店老闆兼情報員，年約三十五，**身材瘦削修長、面色微黃憔悴（長年不見天日）**，蓄短鬚，戴皂巾、穿青色長衫、繫圍裙，**手執短刀或酒杯**。神情精明老練、有江湖耳目氣質。背景：梁山泊邊酒店。畫風：中國古風工筆。圖片**左上方直書「旱地忽律朱貴」繁體書法**，**正下方朱紅方印刻「地藏」**。除此題款外不可有其他文字。",
  38: "北宋末年武將，年約三十，**身材魁梧、面色黝黑、滿臉鬚髯**，戴鳳翅盔、披紅色戰袍配鐵甲，**手執大金蘸斧（開斧）**，騎黃馬。神情急躁勇猛。背景：戰場、火光。畫風：中國古風工筆。圖片**左上方直書「急先鋒索超」繁體書法**，**正下方朱紅方印刻「天空」**。除此題款外不可有其他文字。",
  39: "北宋末年青年男性，年約二十二，**身材修長、面白如玉、英俊年輕、目光清澈**，蓄短髭，束髮戴英雄巾、穿白色或淺青色錦緞武人袍、束絲絛，**手執朴刀**。氣質清俊。背景：清風山或蘇州街市。畫風：中國古風工筆。圖片**左上方直書「白面郎君鄭天壽」繁體書法**，**正下方朱紅方印刻「地異」**。除此題款外不可有其他文字。",
  40: "北宋末年山賊頭領，年約三十二，**身材壯碩、面色黧黑、有橘紅色虎紋刺青或穿著虎紋皮甲（綽號「錦毛虎」由來）**，包頭巾、穿緊身武人裝、束腰，**手執朴刀**。神情粗獷威猛。背景：清風山山寨。畫風：中國古風工筆。圖片**左上方直書「錦毛虎燕順」繁體書法**，**正下方朱紅方印刻「地強」**。除此題款外不可有其他文字。",

  73: "北宋末年文士會計師，年約三十，**身材修長、面白瘦削、目光精明**，戴儒巾、穿青色長衫，**手執算盤或竹簡賬冊**。神情精於計算。背景：山寨帳房、案上有算盤竹簡。畫風：中國古風工筆。圖片**左上方直書「神算子蔣敬」繁體書法**，**正下方朱紅方印刻「地會」**。除此題款外不可有其他文字。",
  74: "北宋末年農夫出身的好漢，年約三十二，**身材結實壯碩、面色黝黑（農民膚色）、雙手粗壯**，戴笠帽或包頭巾、穿土褐色短打粗布衣、繫腰、裸足或穿草鞋，**手執鐵鋤頭（特殊武器）或鐵鏟**。神情憨厚剛強。背景：黃門山。畫風：中國古風工筆。圖片**左上方直書「九尾龜陶宗旺」繁體書法**，**正下方朱紅方印刻「地理」**。除此題款外不可有其他文字。",
  75: "北宋末年裁縫匠，年約三十，**身材瘦削、雙臂異常修長（如猿臂）、面色微黑、目光精明**，戴青巾、穿青色長衫、繫腰，**手執剪刀或短劍**。神情靈活機敏。背景：裁縫店、案上有布匹。畫風：中國古風工筆。圖片**左上方直書「通臂猿侯健」繁體書法**，**正下方朱紅方印刻「地遂」**。除此題款外不可有其他文字。",
  76: "北宋末年酒店老闆，年約三十，**身材中等微胖、面色紅潤、面帶笑容（似笑非笑、藏鋒）**，蓄短鬚，戴皂巾、穿青色長衫、繫圍裙，**手執酒壺或短刀**。神情笑裡藏刀。背景：沂水縣酒店。畫風：中國古風工筆。圖片**左上方直書「笑面虎朱富」繁體書法**，**正下方朱紅方印刻「地平」**。除此題款外不可有其他文字。",
  77: "北宋末年官差都頭，年約三十二，**身材結實、面色微黃、雙眼瞳色青（罕見的青眼，綽號由來）**，蓄短鬚，戴皂巾、穿青色公差袍、束腰，**手執朴刀**。神情正直。背景：沂水縣街市。畫風：中國古風工筆。圖片**左上方直書「青眼虎李雲」繁體書法**，**正下方朱紅方印刻「地惡」**。除此題款外不可有其他文字。",
  78: "北宋末年司法官吏，年約四十，**身材中等、面色黝黑如鐵、五官威嚴方正、目光如電**，蓄短黑鬚，戴黑色官帽、穿青色官袍，**手執判官筆或木牘**。神情冷峻剛正、有判官氣派。背景：衙門公堂或大牢。畫風：中國古風工筆。圖片**左上方直書「鐵面孔目裴宣」繁體書法**，**正下方朱紅方印刻「地正」**。除此題款外不可有其他文字。",
  79: "北宋末年造船匠，年約三十，**身材極為高大瘦長（如旗幡竿）、皮膚白皙、面相清秀**，戴匠人巾、穿青色短打工裝、束腰，**手執斧鋸或長槍**。神情幹練。背景：船廠、半成船骨架。畫風：中國古風工筆。圖片**左上方直書「玉幡竿孟康」繁體書法**，**正下方朱紅方印刻「地滿」**。除此題款外不可有其他文字。",
  80: "北宋末年莊客，年約三十二，**身材中等、面貌古怪醜陋（鬼臉、面相不協調，五官扭曲）、目光精明**，戴黑巾、穿青色長衫，**手執朴刀**。神情精明。背景：李家莊。畫風：中國古風工筆。圖片**左上方直書「鬼臉兒杜興」繁體書法**，**正下方朱紅方印刻「地短」**。除此題款外不可有其他文字。",
  81: "北宋末年武人，年約二十八，**身材結實、面色微黃、面貌與兄孫立相似（小尉遲）**，蓄短鬚，戴武人巾、穿青色武人勁裝，**手執雙鞭或腰刀**。神情勇武。背景：登州。畫風：中國古風工筆。圖片**左上方直書「小尉遲孫新」繁體書法**，**正下方朱紅方印刻「地陰」**。除此題款外不可有其他文字。",
  82: "北宋末年山賊頭領，年約三十二，**身材結實壯碩、面色黝黑、目光勇武**，戴黑巾、穿土褐色短打、束腰，**手執朴刀**。神情粗獷。背景：登州山林。畫風：中國古風工筆。圖片**左上方直書「獨角龍鄒淵」繁體書法**，**正下方朱紅方印刻「地角」**。除此題款外不可有其他文字。",
  83: "北宋末年山賊，年約二十六，**身材結實壯碩、面色黝黑、頭頂上有一塊肉瘤突起（如角狀）**，戴黑巾遮蓋瘤、穿青色武人短打，**手執朴刀**。神情勇猛。背景：登州山林。畫風：中國古風工筆。圖片**左上方直書「出林龍鄒潤」繁體書法**，**正下方朱紅方印刻「地囚」**。除此題款外不可有其他文字。",
  84: "北宋末年江湖打手，年約三十，**身材結實、面色焦黑、面相冷酷凶悍、目光無情**，蓄短鬚，赤膊或穿短打武人勁裝、束腰，雙手結實如鐵，**或赤手相撲姿勢、或執短鏈**。神情冷酷。背景：江湖、相撲場。畫風：中國古風工筆。圖片**左上方直書「沒面目焦挺」繁體書法**，**正下方朱紅方印刻「地醜」**。除此題款外不可有其他文字。",
  85: "北宋末年鐵匠，年約三十，**身材結實、面色焦黑、滿臉麻點、身上有金錢圖案刺青（綽號由來）**，戴皂巾、穿土黃色短打鐵匠工裝、束革帶，**手執鐵錘或寶劍**。神情粗獷實在。背景：鐵匠鋪、爐火熊熊。畫風：中國古風工筆。圖片**左上方直書「金錢豹子湯隆」繁體書法**，**正下方朱紅方印刻「地全」**。除此題款外不可有其他文字。",
  86: "北宋末年武將，年約三十五，身材魁梧，**面色赤紅、留鬍鬚**，戴鐵盔、披黃色戰袍配甲，**手執棗木朔**。神情威武。背景：戰場、連環馬陣。畫風：中國古風工筆。圖片**左上方直書「百勝將韓滔」繁體書法**，**正下方朱紅方印刻「地威」**。除此題款外不可有其他文字。",
  87: "北宋末年武將，年約三十二，**身材壯碩、面色青黑、目光威嚴有神**，蓄短鬚，戴武將盔、穿戰袍配甲，**手執三尖兩刃八環刀**。神情冷峻。背景：戰場。畫風：中國古風工筆。圖片**左上方直書「天目將彭玘」繁體書法**，**正下方朱紅方印刻「地英」**。除此題款外不可有其他文字。",
  88: "北宋末年火器專家武將，年約三十五，**身材中等、面色微赤（火藥薰染）、目光精明**，戴武人巾、穿青色或棕色短打勁裝、束革帶、繫火藥包，**手執火砲信子或矮腳虎子母砲**。神情精於技術。背景：火砲陣地、煙霧瀰漫。畫風：中國古風工筆。圖片**左上方直書「轟天雷凌振」繁體書法**，**正下方朱紅方印刻「地軸」**。除此題款外不可有其他文字。",
  89: "北宋末年道士兼山賊頭領，年約三十二，**披散長黑髮、面色微黃、目光深邃帶法術氣息**，穿藍灰色道袍配獸面護心鏡、腰繫絲絛、繫五色絲線，**手執桃木劍或鋼鞭**。神情神秘玄奧。背景：芒碭山雲霧、法陣。畫風：中國古風工筆。圖片**左上方直書「混世魔王樊瑞」繁體書法**，**正下方朱紅方印刻「地默」**。除此題款外不可有其他文字。",
  90: "北宋末年滾牌手，年約二十五，**身材精瘦敏捷、面色微黑、目光銳利**，戴黑巾、穿緊身武人勁裝、繫腿，**身披三十六口飛標、左手持團牌（圓盾）、右手持標槍或短劍**。神情敏捷凌厲。背景：芒碭山。畫風：中國古風工筆。圖片**左上方直書「八臂哪吒項充」繁體書法**，**正下方朱紅方印刻「地飛」**。除此題款外不可有其他文字。",
  91: "北宋末年滾牌手，年約二十五，**身材精瘦敏捷、面色微黑、面相靈動**，戴黑巾、穿緊身武人勁裝、繫腿，**身披二十四口飛刀、左手持團牌、右手持標槍**。神情靈巧敏捷。背景：芒碭山、與項充並肩。畫風：中國古風工筆。圖片**左上方直書「飛天大聖李袞」繁體書法**，**正下方朱紅方印刻「地走」**。除此題款外不可有其他文字。",
  92: "北宋末年盜馬賊，年約三十，**身材精瘦、面色微黑、滿臉金黃色鬚髯（綽號「金毛」由來）、頭髮亦微黃**，戴黑巾、穿青色或棕色武人短打、束腰、繫腿，**手執馬鞭或短刀**，旁有駿馬。神情精明老練。背景：北方草原或馬廄。畫風：中國古風工筆。圖片**左上方直書「金毛犬段景住」繁體書法**，**正下方朱紅方印刻「地察」**。除此題款外不可有其他文字。",
  93: "北宋末年押獄劊子手，年約三十二，**身材壯碩、雙臂特別粗壯（如鐵臂）、面色微黑、目光威嚴**，蓄短鬚，戴皂巾、穿紅色或暗紅色行刑服，**手執鬼頭刀**。神情冷峻。背景：大名府牢城刑場。畫風：中國古風工筆。圖片**左上方直書「鐵臂膊蔡福」繁體書法**，**正下方朱紅方印刻「地損」**。除此題款外不可有其他文字。",
  94: "北宋末年青年押獄，年約二十六，**身材修長、面白俊秀、鬢邊插一朵紅花（綽號由來，刻意風流的打扮）**，戴黑巾、穿紅色或紫色武人勁裝，**手執短劍或腰刀**。神情風流中帶冷意。背景：大名府或刑場。畫風：中國古風工筆。圖片**左上方直書「一枝花蔡慶」繁體書法**，**正下方朱紅方印刻「地奴」**。除此題款外不可有其他文字。",
  95: "北宋末年武將，年約四十，**身材魁偉如關羽再世，面如重棗（深紅色）、丹鳳眼、臥蠶眉、五綹長髯**，戴綠色錦盔、披綠色戰袍配金甲，騎赤紅戰馬，**手提青龍偃月刀**。氣質：威武忠義。背景：戰場或軍營。畫風：中國古風工筆。圖片**左上方直書「大刀關勝」繁體書法**，**正下方朱紅方印刻「天勇」**。除此題款外不可有其他文字。",
  96: "北宋末年武將，年約三十五，**面貌醜陋怪異、紫色臉、卷髮赤鬚、雙目深陷**，戴武人盔、穿戰袍配甲，**手執大鐵刀**。神情陰沉複雜（醜貌但官位顯赫的反差）。背景：戰場或宋朝邊關。畫風：中國古風工筆。圖片**左上方直書「醜郡馬宣贊」繁體書法**，**正下方朱紅方印刻「地傑」**。除此題款外不可有其他文字。",
  97: "北宋末年武將，年約三十，**身材高大壯碩、面色微黑、目光勇武**，蓄短鬚，戴鳳翅盔、披紅色戰袍配甲，**手執方天畫戟**。神情忠勇。背景：戰場、關勝部下。畫風：中國古風工筆。圖片**左上方直書「井木犴郝思文」繁體書法**，**正下方朱紅方印刻「地雄」**。除此題款外不可有其他文字。",
  98: "北宋末年名醫，年約四十，**身材修長、面白清秀、目光溫和睿智**，蓄三縷長鬚，戴儒巾、穿青色長衫、外披藥師袖罩，**手執藥囊或藥碾子**，腰掛繫藥袋。神情仁厚清雅。背景：藥房、案上有藥材草本。畫風：中國古風工筆。圖片**左上方直書「神醫安道全」繁體書法**，**正下方朱紅方印刻「地靈」**。除此題款外不可有其他文字。",
  99: "北宋末年青年酒保，年約二十二，**身材瘦小靈活、面色微黑、目光靈動**，戴皂巾、穿青色短打武人勁裝、束腰，**手執短刀或棍棒**。神情敏捷。背景：揚子江邊小酒店。畫風：中國古風工筆。圖片**左上方直書「活閃婆王定六」繁體書法**，**正下方朱紅方印刻「地健」**。除此題款外不可有其他文字。",
  100: "北宋末年武將兼方術師，年約三十五，**身材中等、面色微紅、目光深邃**，戴武將盔配水紋飾、穿藍色戰袍配甲，**手執丈八蛇矛**，騎神駿馬。神情有方術氣息。背景：戰場、水霧中。畫風：中國古風工筆。圖片**左上方直書「聖水將軍單廷珪」繁體書法**，**正下方朱紅方印刻「地奇」**。除此題款外不可有其他文字。",
  101: "北宋末年武將兼方術師，年約三十五，**身材壯碩、面色赤紅如火、目光火炙**，戴武將盔配火紋飾、穿紅色戰袍配甲（火元素），**手執火尖槍或長劍**。神情有方術之威。背景：戰場、火光熊熊。畫風：中國古風工筆。圖片**左上方直書「神火將軍魏定國」繁體書法**，**正下方朱紅方印刻「地猛」**。除此題款外不可有其他文字。",
  102: "北宋末年武將，年約三十，**身材壯碩、面色赤紅、面相猙獰凶悍如惡神**，散亂黑髮包巾、穿黑色或暗紅色武人勁裝、束腰，**手執鬼頭刀或闊劍**。神情凶煞。背景：戰場、血氣騰騰。畫風：中國古風工筆。圖片**左上方直書「喪門神鮑旭」繁體書法**，**正下方朱紅方印刻「地暴」**。除此題款外不可有其他文字。",
  103: "北宋末年獸醫，年約四十五，**身材中等、面色紅潤、滿臉紫色（深棕紅）長鬚垂胸**，戴黃色軟巾、穿土褐色長衫，**手執馬鞭或獸醫器具**。神情親切專業。背景：馬廄、有馬匹。畫風：中國古風工筆。圖片**左上方直書「紫髯伯皇甫端」繁體書法**，**正下方朱紅方印刻「地獸」**。除此題款外不可有其他文字。",
  104: "北宋末年降將，年約三十，**身材異常高大壯碩（如廟門口的險道神像）、面色黝黑、相貌兇悍**，戴武人盔、穿黑色武人勁裝，**手執長旗（中軍寶纛旗）或長槍**。神情威嚴。背景：戰場中軍、巨大旗幟。畫風：中國古風工筆。圖片**左上方直書「險道神郁保四」繁體書法**，**正下方朱紅方印刻「地耗」**。除此題款外不可有其他文字。",
  105: "北宋末年武將，年約三十，**英俊瀟灑、面如冠玉、目光銳利**，蓄短鬚，戴鳳翅盔、披紅戰袍配明光甲，**雙手各持一把銀槍**，騎白龍駒。氣質：文武雙全、風流武將。背景：戰場馬上。畫風：中國古風工筆。圖片**左上方直書「雙鎗將董平」繁體書法**，**正下方朱紅方印刻「天立」**。除此題款外不可有其他文字。",

function matchHero(h) {
  if (currentFaction !== 'all' && h.faction !== currentFaction) return false;
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    const hay = (h.name + h.nick + h.star).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function buildRelTags(arr, isEnemy) {
  if (!arr || !arr.length) return '<span style="color:var(--text-3);font-size:13px;">—</span>';
  return arr.map(r => {
    const cls = ['rel-tag'];
    if (isEnemy) cls.push('enemy');
    if (r.ext) cls.push('ext');
    const dataAttr = r.id ? `data-jump="${r.id}"` : '';
    return `<span class="${cls.join(' ')}" ${dataAttr}>${r.n}</span>`;
  }).join('');
}

  return `
    <article class="hero-card" data-id="${h.num}">

      <div class="card-body">

          <span class="nick">${h.nick}</span>
          <span class="star">${h.star}</span>

          <span class="chapter">${h.chapter}</span>
        </div>
        <div class="detail">
          <div class="detail-row"><span class="detail-key">武器</span><span class="detail-val">${h.weapon}</span></div>

function renderTimeline() {
  const list = heroes.filter(matchHero);
  if (!list.length) {
    timelineEl.innerHTML = '';
    return false;
  }
  timelineEl.innerHTML = list.map(buildCard).join('');
  attachCardHandlers(timelineEl);
  return true;
}

function renderStars() {
  const list = heroes.filter(matchHero);
  if (!list.length) {
    starsEl.innerHTML = '';
    return false;
  }
  const tian = list.filter(h => h.isTian).sort((a, b) => a.rank - b.rank);
  const di = list.filter(h => !h.isTian).sort((a, b) => a.rank - b.rank);

  let html = '';
  if (tian.length) {
    html += `<section class="stars-section">
      <div class="stars-section-head">
        <h2 class="stars-section-title">天罡</h2>
        <span class="stars-count">${tian.length} of 36</span>
      </div>
      <div class="stars-grid">
        ${tian.map(h => buildStarTile(h)).join('')}
      </div>
    </section>`;
  }
  if (di.length) {
    html += `<section class="stars-section">
      <div class="stars-section-head">
        <h2 class="stars-section-title">地煞</h2>
        <span class="stars-count">${di.length} of 72</span>
      </div>
      <div class="stars-grid">
        ${di.map(h => buildStarTile(h)).join('')}
      </div>
    </section>`;
  }
  starsEl.innerHTML = html;
  attachStarTileHandlers();
  return true;
}

function buildStarTile(h) {

      <div class="star-tile-name">${h.name}</div>
      <div class="star-tile-nick">${h.nick} · ${h.chapter}</div>

  `;
}

function renderStats() {
  const list = heroes.filter(matchHero);
  if (!list.length) { statsEl.innerHTML = ''; return false; }

  // 整體統計
  const totalEndCounts = {};
  endTypeOrder.forEach(t => totalEndCounts[t] = 0);
  list.forEach(h => totalEndCounts[h.endType] = (totalEndCounts[h.endType] || 0) + 1);
  const survivors = list.filter(h => ['善終','出家','失蹤'].includes(h.endType)).length;
  const tian = list.filter(h => h.isTian).length;

  const overallBar = endTypeOrder.map(t => {
    const c = totalEndCounts[t];
    if (!c) return '';
    const pct = (c / list.length * 100).toFixed(1);
    return `<span style="flex:${c};background:${endTypeColors[t]};" title="${t} ${c}人 ${pct}%"></span>`;
  }).join('');

  const legendHtml = endTypeOrder.filter(t => totalEndCounts[t] > 0).map(t =>
    `<div class="death-legend-item"><span class="death-legend-swatch" style="background:${endTypeColors[t]};"></span>${t} ${totalEndCounts[t]}</div>`
  ).join('');

  let html = `
    <div class="stats-overview">
      <div class="stats-overview-title">梁 山 結 局</div>
      <div class="stats-totals">
        <div class="stats-total-item">
          <div class="stats-total-num">${list.length}</div>
          <div class="stats-total-label">總 人 數</div>
        </div>
        <div class="stats-total-item">
          <div class="stats-total-num">${tian}</div>
          <div class="stats-total-label">天 罡</div>
        </div>
        <div class="stats-total-item">
          <div class="stats-total-num">${list.length - tian}</div>
          <div class="stats-total-label">地 煞</div>
        </div>
        <div class="stats-total-item">
          <div class="stats-total-num">${survivors}</div>
          <div class="stats-total-label">存 活</div>
        </div>
        <div class="stats-total-item">
          <div class="stats-total-num">${(survivors/list.length*100).toFixed(0)}<span style="font-size:18px;">%</span></div>
          <div class="stats-total-label">存 活 率</div>
        </div>
      </div>
      <div class="death-bar-overall">${overallBar}</div>
      <div class="death-legend">${legendHtml}</div>
    </div>
  `;

  // 派系卡片：要在當前篩選下顯示有人的派系
  const factions = factionOrder.filter(f => list.some(h => h.faction === f));
  html += '<div class="faction-cards">';
  factions.forEach(f => {
    const flist = list.filter(h => h.faction === f);
    const ftian = flist.filter(h => h.isTian).length;
    const fcounts = {};
    endTypeOrder.forEach(t => fcounts[t] = 0);
    flist.forEach(h => fcounts[h.endType] = (fcounts[h.endType] || 0) + 1);
    const fsurvivors = flist.filter(h => ['善終','出家','失蹤'].includes(h.endType)).length;
    const fsurvivePct = (fsurvivors / flist.length * 100).toFixed(0);
    const avgRank = (flist.reduce((s, h) => s + h.rank, 0) / flist.length).toFixed(1);

    const bar = endTypeOrder.map(t => {
      const c = fcounts[t];
      if (!c) return '';
      return `<span style="flex:${c};background:${endTypeColors[t]};" title="${t} ${c}人"></span>`;
    }).join('');

    const fInfo = factionMap[f];
    const top3 = flist.slice().sort((a,b) => a.rank - b.rank).slice(0, 3).map(h => h.name).join('、');

    html += `
      <div class="faction-card" style="border-top-color:${fInfo.color};">
        <div class="faction-card-head">
          <span class="faction-card-name" style="color:${fInfo.color};">${fInfo.label}</span>
          <span class="faction-card-count">${flist.length}<span class="unit">人</span></span>
        </div>
        <div class="faction-card-meta">
          <span>天罡 <b>${ftian}</b></span>
          <span>地煞 <b>${flist.length - ftian}</b></span>
          <span>存活率 <b>${fsurvivePct}%</b></span>
        </div>
        <div class="death-bar">${bar}</div>
        <div class="faction-card-stats">
          <em>代表：</em>${top3}<br>
          <em>平均星位：</em>${avgRank}　<em>戰死：</em>${fcounts['戰死']}　<em>善終：</em>${fcounts['善終']}
        </div>
      </div>
    `;
  });
  html += '</div>';

  statsEl.innerHTML = html;
  return true;
}

function drawGraph(list) {
  const ids = new Set(list.map(h => h.num));
  const nodes = list.map(h => ({
    id: h.num, name: h.name, nick: h.nick, star: h.star,
    faction: h.faction, isTian: h.isTian,
    color: factionMap[h.faction].color
  }));

  const links = [];
  const seen = new Set();
  list.forEach(h => {
    h.rel.sworn.forEach(r => {
      if (r.id && ids.has(r.id) && r.id !== h.num) {
        const key = h.num < r.id ? `${h.num}-${r.id}-s` : `${r.id}-${h.num}-s`;
        if (!seen.has(key)) {
          seen.add(key);
          links.push({ source: h.num, target: r.id, type: 'sworn' });
        }
      }
    });
    if (graphShowEnemies) {
      h.rel.enemies.forEach(r => {
        if (r.id && ids.has(r.id) && r.id !== h.num) {
          const key = h.num < r.id ? `${h.num}-${r.id}-e` : `${r.id}-${h.num}-e`;
          if (!seen.has(key)) {
            seen.add(key);
            links.push({ source: h.num, target: r.id, type: 'enemy' });
          }
        }
      });
    }
  });

  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  const container = document.getElementById('graph-container');
  const w = container.clientWidth;
  const h = container.clientHeight;

  const g = svg.append('g');

  // zoom & pan
  svg.call(d3.zoom().scaleExtent([0.4, 3]).on('zoom', (e) => {
    g.attr('transform', e.transform);
  }));

  if (graphSimulation) graphSimulation.stop();
  graphSimulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.type === 'enemy' ? 90 : 60).strength(0.5))
    .force('charge', d3.forceManyBody().strength(-180))
    .force('center', d3.forceCenter(w / 2, h / 2))
    .force('collide', d3.forceCollide().radius(14));

  const link = g.append('g').selectAll('line')
    .data(links).enter().append('line')
    .attr('class', d => 'link ' + d.type);

  const node = g.append('g').selectAll('circle')
    .data(nodes).enter().append('circle')
    .attr('class', d => 'node' + (d.isTian ? ' tian' : ''))
    .attr('r', d => d.isTian ? 8 : 6)
    .attr('fill', d => d.color)
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) graphSimulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) graphSimulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  const label = g.append('g').selectAll('text')
    .data(nodes).enter().append('text')
    .attr('class', 'node-label')
    .text(d => d.name)
    .attr('dy', d => (d.isTian ? -12 : -10));

  const tooltip = d3.select('#graph-tooltip');

  let highlightId = null;
  function setHighlight(hid) {
    highlightId = hid;
    if (hid === null) {
      node.classed('dim', false).classed('highlight', false);
      link.classed('dim', false).classed('highlight', false);
      label.classed('show', false);
      return;
    }
    const connected = new Set([hid]);
    links.forEach(l => {
      const sId = l.source.id !== undefined ? l.source.id : l.source;
      const tId = l.target.id !== undefined ? l.target.id : l.target;
      if (sId === hid) connected.add(tId);
      if (tId === hid) connected.add(sId);
    });
    node.classed('dim', d => !connected.has(d.id));
    node.classed('highlight', d => d.id === hid);
    link.classed('dim', l => {
      const sId = l.source.id !== undefined ? l.source.id : l.source;
      const tId = l.target.id !== undefined ? l.target.id : l.target;
      return sId !== hid && tId !== hid;
    });
    link.classed('highlight', l => {
      const sId = l.source.id !== undefined ? l.source.id : l.source;
      const tId = l.target.id !== undefined ? l.target.id : l.target;
      return sId === hid || tId === hid;
    });
    label.classed('show', d => connected.has(d.id));
  }

  node.on('mouseover', (e, d) => {
    const rect = container.getBoundingClientRect();
    tooltip.html(`
      <div class="tt-name">${d.name}</div>
      <div class="tt-info">${d.nick} · ${d.star} · ${factionMap[d.faction].label}</div>
    `);
    tooltip.style('left', (e.clientX - rect.left + 14) + 'px')
           .style('top', (e.clientY - rect.top + 14) + 'px')
           .classed('show', true);
  })
  .on('mousemove', (e) => {
    const rect = container.getBoundingClientRect();
    tooltip.style('left', (e.clientX - rect.left + 14) + 'px')
           .style('top', (e.clientY - rect.top + 14) + 'px');
  })
  .on('mouseout', () => tooltip.classed('show', false))
  .on('click', (e, d) => {
    e.stopPropagation();
    setHighlight(highlightId === d.id ? null : d.id);
  })
  .on('dblclick', (e, d) => {
    e.stopPropagation();
    jumpToHero(d.id);
  });

  svg.on('click', () => setHighlight(null));

  graphSimulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('cx', d => d.x).attr('cy', d => d.y);
    label.attr('x', d => d.x).attr('y', d => d.y);
  });
}

let isPlaying = false;
let playController = null;

function getChapterNum(h) {
  const m = h.chapter.match(/(\d+)/);
  return m ? parseInt(m[1]) : 999;
}

function sleep(ms) {
  return new Promise(resolve => {
    playController = setTimeout(resolve, ms);
  });
}

async function playTimeline(list) {
  if (isPlaying) return;
  isPlaying = true;
  const playBtn = document.getElementById('graph-play');
  const resetBtn = document.getElementById('graph-reset');
  const overlay = document.getElementById('play-overlay');
  const chapterEl = document.getElementById('play-chapter');
  const counterEl = document.getElementById('play-counter');
  const eventEl = document.getElementById('play-event');

  playBtn.style.display = 'none';
  resetBtn.style.display = 'inline-block';
  overlay.classList.add('show');

  // 隱藏所有節點與連線
  d3.selectAll('#graph-svg .node').style('opacity', 0);
  d3.selectAll('#graph-svg .link').style('opacity', 0);
  d3.selectAll('#graph-svg .node-label').classed('show', false);

  // 按章節分組
  const sorted = list.slice().sort((a, b) => getChapterNum(a) - getChapterNum(b) || a.num - b.num);
  const groups = {};
  sorted.forEach(h => {
    const ch = getChapterNum(h);
    if (!groups[ch]) groups[ch] = [];
    groups[ch].push(h);
  });
  const chapters = Object.keys(groups).map(Number).sort((a, b) => a - b);

  const visible = new Set();
  let count = 0;
  const total = list.length;

  for (const ch of chapters) {
    if (!isPlaying) break;
    const newHeroes = groups[ch];
    const hadTian = newHeroes.some(h => h.isTian);
    const isImportantChapter = chapterEvents[ch] !== undefined;
    newHeroes.forEach(h => visible.add(h.num));
    count += newHeroes.length;

    // 更新覆蓋層
    chapterEl.textContent = `第 ${ch} 回`;
    counterEl.textContent = `已 聚 集 ${count} / ${total}`;
    eventEl.textContent = chapterEvents[ch] || '';

    // 音效：依章節重要性與是否有天罡決定鐘鼓
    if (audioEnabled) {
      if (isImportantChapter) {
        playDrum(0.35);
        setTimeout(() => playChime(hadTian ? 880 : 660, 0.6, 0.18), 80);
      } else {
        playChime(hadTian ? 720 : 540, 0.4, 0.13);
      }
    }

    // 顯示新節點 (脈衝動畫)
    d3.selectAll('#graph-svg .node')
      .filter(d => visible.has(d.id))
      .transition().duration(400)
      .style('opacity', 1)
      .attr('r', d => (d.isTian ? 11 : 8))
      .transition().duration(300)
      .attr('r', d => (d.isTian ? 8 : 6));

    // 顯示連線（兩端都已可見的）
    d3.selectAll('#graph-svg .link')
      .filter(d => {
        const sId = d.source.id !== undefined ? d.source.id : d.source;
        const tId = d.target.id !== undefined ? d.target.id : d.target;
        return visible.has(sId) && visible.has(tId);
      })
      .transition().duration(400).style('opacity', 1);

    // 章節間延遲：人多的章節停久一點
    const baseDelay = 700;
    const extraDelay = Math.min(newHeroes.length * 100, 600);
    await sleep(baseDelay + extraDelay);
  }

  if (isPlaying) {
    chapterEl.textContent = '聚 齊';
    counterEl.textContent = `108 將 · 替 天 行 道`;
    eventEl.textContent = '第 71 回 · 石碣降天';
    // 終曲音效：鑼+三聲鼓
    if (audioEnabled) {
      playGong(0.35);
      setTimeout(() => playDrum(0.5), 400);
      setTimeout(() => playDrum(0.45), 700);
      setTimeout(() => playDrum(0.4), 1000);
      setTimeout(() => playGong(0.25), 1500);
    }
    await sleep(2800);
    overlay.classList.remove('show');
  }

  isPlaying = false;
  // 清除內聯樣式讓 highlight 可以正常運作
  d3.selectAll('#graph-svg .node').style('opacity', null).attr('r', d => d.isTian ? 8 : 6);
  d3.selectAll('#graph-svg .link').style('opacity', null);
  playBtn.style.display = 'inline-block';
  resetBtn.style.display = 'none';
}

function resetTimeline(list) {
  isPlaying = false;
  if (playController) clearTimeout(playController);
  document.getElementById('play-overlay').classList.remove('show');
  document.getElementById('graph-play').style.display = 'inline-block';
  document.getElementById('graph-reset').style.display = 'none';
  // 清除內聯樣式（讓 CSS 接管）
  d3.selectAll('#graph-svg .node').style('opacity', null).attr('r', d => d.isTian ? 8 : 6);
  d3.selectAll('#graph-svg .link').style('opacity', null);
}

function renderStance() {
  const list = heroes.filter(matchHero);
  if (!list.length) { document.getElementById('stance-view').innerHTML = ''; return false; }

  const anti = list.filter(h => h.stance === '反招安').sort((a, b) => a.rank - b.rank);
  const neutral = list.filter(h => h.stance === '中立').sort((a, b) => a.rank - b.rank);
  const pro = list.filter(h => h.stance === '親招安').sort((a, b) => a.rank - b.rank);

  const total = list.length;
  const antiPct = (anti.length / total * 100).toFixed(1);
  const neutralPct = (neutral.length / total * 100).toFixed(1);
  const proPct = (pro.length / total * 100).toFixed(1);

  function chip(h) {
    const fcolor = factionMap[h.faction].color;
    return `<div class="stance-chip ${h.isTian ? 'tian' : ''}" style="border-left-color:${fcolor};" data-id="${h.num}">
      <span class="stance-chip-name">${h.name}</span>
      <span class="stance-chip-nick">${h.nick}</span>
    </div>`;
  }

  const html = `
    <div class="stance-intro">
      <div class="stance-intro-title">招 安 路 線 之 爭</div>
      <div class="stance-intro-text">
        晁蓋死後，宋江主導梁山轉向接受朝廷招安。書中真正<em>表態</em>的人不多——明確反對的只有 <em>${anti.length} 人</em>（${antiPct}%）；積極推動或結構上必然支持的有 <em>${pro.length} 人</em>（${proPct}%）；剩下 <em>${neutral.length} 人</em>（${neutralPct}%）沒有明確立場，被路線帶著走。
        <br><br>
        梁山的命運不是被多數人決定的——是被一群少數的關鍵人物推著走的。下面是三派人物的分組：
      </div>
      <div class="stance-bar">
        <span class="anti" style="flex:${anti.length};" title="反招安 ${anti.length} 人"></span>
        <span class="neutral" style="flex:${neutral.length};" title="中立 ${neutral.length} 人"></span>
        <span class="pro" style="flex:${pro.length};" title="親招安 ${pro.length} 人"></span>
      </div>
    </div>
    <div class="stance-cols">
      <div class="stance-col anti">
        <div class="stance-col-head">
          <div class="stance-col-title">反 招 安</div>
          <div class="stance-col-meta"><b>${anti.length}</b>人 · ${antiPct}%</div>
          <div class="stance-quote">「招甚鳥安！」李逵踢翻聖旨。<br>「冷了弟兄們的心。」武松喝止。</div>
        </div>
        <div class="stance-chips">${anti.map(chip).join('')}</div>
      </div>
      <div class="stance-col neutral">
        <div class="stance-col-head">
          <div class="stance-col-title">中 立</div>
          <div class="stance-col-meta"><b>${neutral.length}</b>人 · ${neutralPct}%</div>
          <div class="stance-quote">大多數梁山好漢沒有公開表態。技工、副將、地方小頭領，他們的命運被別人決定。</div>
        </div>
        <div class="stance-chips">${neutral.map(chip).join('')}</div>
      </div>
      <div class="stance-col pro">
        <div class="stance-col-head">
          <div class="stance-col-title">親 招 安</div>
          <div class="stance-col-meta"><b>${pro.length}</b>人 · ${proPct}%</div>
          <div class="stance-quote">「權借水泊歇馬，待朝廷赦罪招安。」宋江反覆對眾兄弟說。降將與貴族天然親體制。</div>
        </div>
        <div class="stance-chips">${pro.map(chip).join('')}</div>
      </div>
    </div>
  `;

  const el = document.getElementById('stance-view');
  el.innerHTML = html;
  el.querySelectorAll('.stance-chip').forEach(c => {
    c.addEventListener('click', () => jumpToHero(parseInt(c.dataset.id)));
  });
  return true;
}

function attachCardHandlers(root) {
  root.querySelectorAll('.card-body').forEach(body => {
    body.addEventListener('click', (e) => {
      if (e.target.classList.contains('rel-tag')) return;
      if (e.target.closest('.prompt-section')) return; // 點繪圖提示區不觸發卡片開合
      body.classList.toggle('expanded');
      if (audioEnabled) playPageFlip();
    });
  });
  root.querySelectorAll('.rel-tag[data-jump]').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(tag.dataset.jump);
      jumpToHero(id);
    });
  });
  attachPromptHandlers(root);
}

// 繪圖提示詞展開 + 複製（給 timeline 卡片跟 modal 共用）
function attachPromptHandlers(root) {
  root.querySelectorAll('.prompt-toggle').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      btn.classList.toggle('open');
      const content = btn.nextElementSibling;
      if (content) content.classList.toggle('show');
    });
  });
  root.querySelectorAll('.prompt-copy').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const textEl = btn.parentElement.querySelector('.prompt-text');
      if (!textEl) return;
      const text = textEl.textContent.trim();
      let ok = false;
      try {
        await navigator.clipboard.writeText(text);
        ok = true;
      } catch (err) {
        // fallback：建臨時 textarea + execCommand
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); ok = true; } catch (e2) {}
        document.body.removeChild(ta);
      }
      btn.textContent = ok ? '已 複 製' : '失 敗';
      if (ok) btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '複 製';
        btn.classList.remove('copied');
      }, 1500);
    });
  });
}

function attachStarTileHandlers() {
  starsEl.querySelectorAll('.star-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      openHeroModal(parseInt(tile.dataset.id));
    });
  });
}

// === Hero Modal ===
// 從 stars / stance / graph / 關係圖 點人 → 開 modal（不切走 view）
// 在 timeline view 點 rel-tag → 維持原本滾動展開
// modal 已開時點 rel-tag → 換成新人物（保持在 modal 內）
function isHeroModalOpen() {
  return document.getElementById('hero-modal').classList.contains('show');
}

function openHeroModal(id) {
  const h = heroes.find(x => x.num === id);
  if (!h) return;
  const body = document.getElementById('hero-modal-body');
  body.innerHTML = buildCard(h);
  // 強制展開（modal 內卡片永遠展開狀態）
  const cardBody = body.querySelector('.card-body');
  if (cardBody) cardBody.classList.add('expanded');
  // 重綁 rel-tag 跳轉（modal 內跳轉 = 換人，仍留在 modal）
  body.querySelectorAll('.rel-tag[data-jump]').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.stopPropagation();
      openHeroModal(parseInt(tag.dataset.jump));
    });
  });
  // 綁繪圖提示詞 toggle/copy
  attachPromptHandlers(body);
  // 滾回 modal 頂端（避免上一個人滾到一半的位置殘留）
  document.getElementById('hero-modal').scrollTop = 0;
  document.getElementById('hero-modal').classList.add('show');
  document.body.style.overflow = 'hidden'; // 鎖背景滾動
  if (audioEnabled) playPageFlip();
}

function closeHeroModal() {
  document.getElementById('hero-modal').classList.remove('show');
  document.body.style.overflow = '';
}

function jumpToHero(id) {
  // 在 timeline 以外的 view，或 modal 已開時 → 開 modal
  if (currentView !== 'timeline' || isHeroModalOpen()) {
    openHeroModal(id);
    return;
  }
  // Timeline view 原本邏輯：滾動到對應卡片並展開
  setTimeout(() => {
    const target = timelineEl.querySelector(`.hero-card[data-id="${id}"]`);
    if (!target) {
      currentSearch = '';
      currentFaction = 'all';
      document.getElementById('search').value = '';
      document.querySelectorAll('#filters .chip').forEach(c => c.classList.remove('active'));
      document.querySelector('#filters .chip[data-faction="all"]').classList.add('active');
      render();
      setTimeout(() => jumpToHero(id), 60);
      return;
    }
    const body = target.querySelector('.card-body');
    body.classList.add('expanded');
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    target.classList.add('highlight-flash');
    setTimeout(() => target.classList.remove('highlight-flash'), 1700);
  }, 100);
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  timelineEl.classList.add('hidden');
  starsEl.classList.remove('show');
  statsEl.classList.remove('show');
  graphEl.classList.remove('show');
  document.getElementById('stance-view').classList.remove('show');
  if (view === 'timeline') {
    timelineEl.classList.remove('hidden');
  } else if (view === 'stars') {
    starsEl.classList.add('show');
  } else if (view === 'stats') {
    statsEl.classList.add('show');
  } else if (view === 'graph') {
    graphEl.classList.add('show');
  } else if (view === 'stance') {
    document.getElementById('stance-view').classList.add('show');
  }
  render();
}

function render() {
  let hasResults;
  if (currentView === 'timeline') {
    hasResults = renderTimeline();
  } else if (currentView === 'stars') {
    hasResults = renderStars();
  } else if (currentView === 'stats') {
    hasResults = renderStats();
  } else if (currentView === 'graph') {
    hasResults = renderGraph();
  } else if (currentView === 'stance') {
    hasResults = renderStance();
  }
  emptyEl.style.display = hasResults ? 'none' : 'block';
  if (!hasResults) {
    timelineEl.classList.add('hidden');
    starsEl.classList.remove('show');
    statsEl.classList.remove('show');
    graphEl.classList.remove('show');
    document.getElementById('stance-view').classList.remove('show');
  } else if (currentView === 'timeline') {
    timelineEl.classList.remove('hidden');
  }
}

document.getElementById('search').addEventListener('input', (e) => {
  currentSearch = e.target.value.trim();
  render();
});

document.querySelectorAll('#filters .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#filters .chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFaction = chip.dataset.faction;
    render();
  });
});

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

document.getElementById('sound-toggle').addEventListener('click', toggleAudio);
document.getElementById('bgm-toggle').addEventListener('click', toggleBGM);

// Hero modal 關閉觸發：背景遮罩、X 鈕、ESC 鍵
document.getElementById('hero-modal-backdrop').addEventListener('click', closeHeroModal);
document.getElementById('hero-modal-close').addEventListener('click', closeHeroModal);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && isHeroModalOpen()) closeHeroModal();
});

render();
</script>
